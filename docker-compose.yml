# Design Ref: §2.1 — Docker Compose (backend + frontend + db + cloudflared)
services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - '3001:3001'
      - '4318:4318'
    environment:
      DATABASE_URL: postgresql://refinery:refinery@db:5432/refinery
      API_KEY: ${API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OTLP_HTTP_PORT: 4318
      PORT: 3001
      NODE_ENV: production
      LOG_LEVEL: info
      RETENTION_DAYS: ${RETENTION_DAYS:-90}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001}
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: refinery
      POSTGRES_PASSWORD: refinery
      POSTGRES_DB: refinery
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U refinery']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
